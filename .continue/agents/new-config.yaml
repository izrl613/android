name: Agape Sovereign - Gemma 4 E4B
version: 1.0.0
schema: v1

models:
  - name: Gemma 4 E4B Ollama
    provider: ollama
    model: gemma4:e4b
    apiBase: http://127.0.0.1:11434
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.2
      topP: 0.9
      contextLength: 8192
  - name: Qwen Coder 1.5B Local
    provider: ollama
    model: qwen2.5-coder:1.5b-base
    apiBase: http://127.0.0.1:11434
    roles:
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.1
      contextLength: 4096

embeddingsProvider:
  provider: ollama
  model: nomic-embed-text:latest
  apiBase: http://127.0.0.1:11434

context:
  - provider: code
  - provider: docs
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder

mcpServers:
  - name: privacy-audit
    command: node
    args:
      - /Users/aarondavid/Documents/agape-sovereign/agape-sovereign/privacy-audit-mcp/src/index.js

rules:
  - Always prefer read-only analysis before editing files.
  - Do not scan node_modules, .git, dist, build, coverage, or cache folders unless the user explicitly asks.
  - Keep a rolling Context Ledger for long tasks with canonical sources, current facts, decisions, risks, and next actions.
  - Treat docs/compliance/ROADMAP.md and docs/compliance/DAILY_LOG.md as canonical compliance sources when present.
  - For cleanup or privacy-audit tasks, move reviewed files to Trash instead of deleting them directly.
  - For the Agape Sovereign non-mobile-os module, use the privacy-audit MCP read-only tools before proposing any cleanup. Treat mobile OS scanning as out of scope.
